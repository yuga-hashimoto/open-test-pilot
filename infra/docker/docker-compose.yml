services:
  postgres:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.postgres
    environment:
      POSTGRES_DB: opentestpilot
      POSTGRES_USER: opentestpilot
      POSTGRES_PASSWORD: opentestpilot-dev-only
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: opentestpilot
      MINIO_ROOT_PASSWORD: opentestpilot-dev-only
    ports: ["9000:9000", "9001:9001"]
    volumes: ["minio-data:/data"]
  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: ["/bin/sh", "-c"]
    command: ["until mc alias set local http://minio:9000 opentestpilot opentestpilot-dev-only; do sleep 1; done; mc mb --ignore-existing local/opentestpilot"]
  server:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.server
    environment:
      PORT: "3001"
      DATABASE_URL: postgresql://opentestpilot:opentestpilot-dev-only@postgres:5432/opentestpilot
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: opentestpilot
      S3_ACCESS_KEY_ID: opentestpilot
      S3_SECRET_ACCESS_KEY: opentestpilot-dev-only
    depends_on: [postgres, redis, minio-init]
    ports: ["3001:3001"]
  web:
    image: node:22-bookworm-slim
    working_dir: /workspace
    command: ["sh", "-c", "corepack enable && pnpm install --frozen-lockfile && pnpm --filter @open-test-pilot/web dev -- --host 0.0.0.0"]
    environment:
      VITE_OPENTESTPILOT_URL: http://localhost:3001
      VITE_OPENTESTPILOT_ORGANIZATION_ID: ${OPENTESTPILOT_ORGANIZATION_ID:-}
      VITE_OPENTESTPILOT_PROJECT_ID: ${OPENTESTPILOT_PROJECT_ID:-}
      VITE_OPENTESTPILOT_TEST_ID: ${OPENTESTPILOT_TEST_ID:-}
    volumes: ["../..:/workspace"]
    ports: ["4173:4173"]
    depends_on: [server]
  runner:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.runner
    environment:
      OPENTESTPILOT_URL: http://server:3001
      OPENTESTPILOT_ORGANIZATION_ID: ${OPENTESTPILOT_ORGANIZATION_ID:?set an organization id before starting runner}
      RUNNER_IMAGE: ${RUNNER_IMAGE:-ghcr.io/open-test-pilot/runner:latest}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on: [server]

volumes:
  postgres-data:
  minio-data:
